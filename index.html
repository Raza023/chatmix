        /* --- Audio Calling System --- */
        let pcs = {}; // For Group Mesh (uid -> PC)
        let incomingCallGroupId = null;
        let callParticipantsListener = null;

        function initCallListener() {
            // Listen for private incoming call notifications in MY inbox
            db.ref('user_calls/' + currentUser.uid).on('value', snap => {
                const data = snap.val();
                if (data && data.status === 'offered') {
                    showIncomingCall(data.callId, data.from, data.isGroup, data.groupId);
                }
            });
        }

        async function startAudioCall() {
            if (!selectedUser) return;
            const name = document.getElementById('selectedUserName').innerText;

            // UI
            document.getElementById('callModal').classList.remove('hidden');
            document.getElementById('callAvatar').innerText = name.split(' ').map(n => n[0]).join('');
            document.getElementById('callName').innerText = name;
            document.getElementById('callStatus').innerText = 'Calling...';
            document.getElementById('acceptBtn').classList.add('hidden');

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

                const callRef = db.ref('calls').push();
                currentCallId = callRef.key;

                if (isGroup) {
                    incomingCallGroupId = selectedUser;
                    await callRef.set({ isGroup: true, groupId: selectedUser, participants: { [currentUser.uid]: { connected: true, isMuted: isMuted } }, timestamp: Date.now(), status: 'active' });

                    // Notify all group members
                    const group = myGroups.find(g => g.gid === selectedUser);
                    if (group && group.members) {
                        for (let uid in group.members) {
                            if (uid !== currentUser.uid) {
                                db.ref('user_calls/' + uid).set({ callId: currentCallId, from: currentUser.uid, status: 'offered', isGroup: true, groupId: selectedUser });
                            }
                        }
                    }
                    listenForGroupSignals();
                    startGroupCallParticipantsListener();
                    document.getElementById('callStatus').innerText = 'Waiting for others...';
                } else {
                    incomingCallGroupId = null;
                    pc = new RTCPeerConnection(config);
                    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

                    pc.onicecandidate = e => {
                        if (e.candidate) {
                            db.ref(`calls/${currentCallId}/candidates`).push(e.candidate.toJSON());
                        }
                    };

                    pc.ontrack = e => {
                        document.getElementById('remoteAudio').srcObject = e.streams[0];
                    };

                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);

                    await callRef.set({
                        from: currentUser.uid,
                        to: selectedUser,
                        offer: { sdp: offer.sdp, type: offer.type },
                        status: 'offered',
                        timestamp: Date.now()
                    });

                    // Notify RECIPIENT
                    db.ref('user_calls/' + selectedUser).set({
                        callId: currentCallId,
                        from: currentUser.uid,
                        status: 'offered'
                    });
                }

                // Auto-stop call after 2 mins if no active connection (mostly for individual)
                clearTimeout(callTimeoutTimer);
                callTimeoutTimer = setTimeout(() => {
                    if (currentCallId && (!isGroup && !pc.currentRemoteDescription)) {
                        showToast("No answer. Call ended.", "success");
                        rejectCall();
                    }
                }, 120000);

                // Listen for individual status changes
                if (!isGroup) {
                    db.ref(`calls/${currentCallId}`).on('value', async s => {
                        const data = s.val();
                        if (!data) return;

                        if (data.status === 'ringing') {
                            document.getElementById('callStatus').innerText = 'Ringing...';
                        } else if (data.status === 'answered' && !pc.currentRemoteDescription) {
                            clearTimeout(callTimeoutTimer);
                            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                            document.getElementById('callStatus').innerText = 'Connected';

                            db.ref('user_calls/' + selectedUser).remove();

                            db.ref(`calls/${currentCallId}/candidates`).on('child_added', snap => {
                                const candid = snap.val();
                                if (candid.from !== currentUser.uid && pc.remoteDescription) {
                                    pc.addIceCandidate(new RTCIceCandidate(candid)).catch(e => console.warn("ICE Error:", e));
                                }
                            });
                        } else if (data.status === 'rejected') {
                            endCallUI();
                        }
                    });
                }

            } catch (err) {
                showToast("Microphone access required for calls.");
                endCallUI();
            }
        }

        async function showIncomingCall(callId, fromUid, isGroupObj = false, groupId = null) {
            currentCallId = callId;
            incomingCallGroupId = isGroupObj ? groupId : null;

            const data = usersData.find(u => u.uid === fromUid);
            let name = data ? data.name : 'Unknown';
            if (isGroupObj && groupId) {
                const grp = myGroups.find(g => g.gid === groupId);
                if (grp) name = `Group Call: ${grp.name}`;
                startGroupCallParticipantsListener();
            }

            document.getElementById('callModal').classList.remove('hidden');
            document.getElementById('callAvatar').innerText = name.split(' ').map(n => n[0]).join('');
            document.getElementById('callName').innerText = name;
            document.getElementById('callStatus').innerText = 'Incoming Call...';
            document.getElementById('acceptBtn').classList.remove('hidden');

            // Notify caller that we are ringing
            db.ref(`calls/${callId}`).update({ status: 'ringing' });

            // Ringtone
            ringtoneAudio = new Audio('./src/ringtone.mp3');
            ringtoneAudio.loop = true;
            ringtoneAudio.play().catch(e => console.warn("Audio play blocked by browser. User interaction needed."));

            // Auto-stop incoming call after 2 mins
            clearTimeout(callTimeoutTimer);
            callTimeoutTimer = setTimeout(() => {
                if (currentCallId === callId) rejectCall();
            }, 120000);

            // Auto-reject listener
            db.ref(`calls/${callId}`).on('value', s => {
                if (!s.exists() || (s.val().status === 'rejected')) endCallUI();
            });
        }

        async function acceptCall() {
            document.getElementById('callStatus').innerText = 'Connecting...';
            document.getElementById('acceptBtn').classList.add('hidden');

            // Stop ringtone and clear timeout as soon as user accepts
            if (ringtoneAudio) {
                ringtoneAudio.pause();
                ringtoneAudio.currentTime = 0;
            }
            clearTimeout(callTimeoutTimer);

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

                if (incomingCallGroupId) {
                    db.ref(`calls/${currentCallId}/participants/${currentUser.uid}`).set({ connected: true, isMuted: isMuted });
                    db.ref('user_calls/' + currentUser.uid).remove();

                    const snap = await db.ref(`calls/${currentCallId}/participants`).once('value');
                    const participants = snap.val() || {};
                    listenForGroupSignals();

                    for (let uid in participants) {
                        if (uid !== currentUser.uid) {
                            await createGroupOffer(uid);
                        }
                    }
                    document.getElementById('callStatus').innerText = 'Connected';
                } else {
                    pc = new RTCPeerConnection(config);
                    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

                    pc.onicecandidate = e => {
                        if (e.candidate) {
                            db.ref(`calls/${currentCallId}/candidates`).push({ ...e.candidate.toJSON(), from: currentUser.uid });
                        }
                    };

                    pc.ontrack = e => {
                        document.getElementById('remoteAudio').srcObject = e.streams[0];
                    };

                    const callSnap = await db.ref(`calls/${currentCallId}`).once('value');
                    const callData = callSnap.val();

                    await pc.setRemoteDescription(new RTCSessionDescription(callData.offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);

                    await db.ref(`calls/${currentCallId}`).update({
                        answer: { sdp: answer.sdp, type: answer.type },
                        status: 'answered'
                    });

                    db.ref(`calls/${currentCallId}/candidates`).on('child_added', s => {
                        const candid = s.val();
                        if (candid.from !== currentUser.uid && pc.remoteDescription) {
                            pc.addIceCandidate(new RTCIceCandidate(candid)).catch(e => console.warn("ICE Error:", e));
                        }
                    });

                    document.getElementById('callStatus').innerText = 'Connected';
                }

            } catch (err) {
                console.error("acceptCall error:", err);
                showToast("Error answering call: " + err.message);
                rejectCall();
            }
        }

        // --- Group WebRTC Mesh Helpers ---
        function startGroupCallParticipantsListener() {
            if (!currentCallId) return;
            if (callParticipantsListener) db.ref(`calls/${currentCallId}/participants`).off('value', callParticipantsListener);
            callParticipantsListener = db.ref(`calls/${currentCallId}/participants`).on('value', snap => {
                renderGroupCallMembers(snap.val() || {});
            });
        }

        function renderGroupCallMembers(participants) {
            const container = document.getElementById('groupCallMembers');
            if (!incomingCallGroupId || !participants || Object.keys(participants).length === 0) {
                container.classList.add('hidden');
                container.classList.remove('flex');
                return;
            }
            container.classList.remove('hidden');
            container.classList.add('flex');

            let html = '';
            for (let uid in participants) {
                const p = participants[uid];
                if (p === true || (p && p.connected)) {
                    const isUserMuted = p.isMuted === true;
                    const isMe = (uid === currentUser.uid);
                    let initial = '?';
                    let avatarSrc = null;
                    let displayName = 'Unknown';

                    if (isMe) {
                        displayName = 'You';
                        if (myData) {
                            avatarSrc = myData.avatar;
                            initial = myData.name ? myData.name[0].toUpperCase() : currentUser.email[0].toUpperCase();
                        } else {
                            initial = currentUser.email[0].toUpperCase();
                        }
                    } else {
                        const uData = usersData.find(u => u.uid === uid);
                        if (uData) {
                            displayName = uData.name;
                            avatarSrc = uData.avatar;
                            initial = uData.name[0].toUpperCase();
                        }
                    }

                    html += `
                        <div class="flex flex-col items-center animate-fade-in group w-16 md:w-20">
                            <div class="w-12 h-12 md:w-14 md:h-14 rounded-full bg-white/10 flex items-center justify-center border-2 ${isUserMuted ? 'border-red-500' : 'border-green-500'} overflow-hidden shadow-lg mb-2 relative transition-all">
                                ${avatarSrc ? `<img src="${avatarSrc}" class="w-full h-full object-cover transition-all duration-300 ${isUserMuted ? 'opacity-30 grayscale' : ''}">` : `<span class="font-bold text-white text-lg transition-all duration-300 ${isUserMuted ? 'opacity-30' : ''}">${escapeHTML(initial)}</span>`}
                                ${isUserMuted ? `<div class="absolute inset-0 m-auto w-6 h-6 bg-red-500 rounded-full flex items-center justify-center shadow-lg"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M1 1l22 22M9 9v3a3 3 0 005.121 2.121M15 9.34V5a3 3 0 00-5.943-.584M19 11a7 7 0 01-12.012 4.988M12 18.5V22m-4 0h8" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"></path></svg></div>` : ''}
                                <div class="absolute bottom-0 right-0 w-3 h-3 ${isUserMuted ? 'bg-red-500' : 'bg-green-500 animate-pulse'} rounded-full border-2 border-black"></div>
                            </div>
                            <span class="text-[9px] md:text-[10px] uppercase font-bold tracking-wider ${isUserMuted ? 'text-white/40' : 'text-white/70'} truncate w-full text-center transition-colors shadow-neo">${escapeHTML(displayName)}</span>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
        }

        function createGroupPC(targetUid) {
            const peer = new RTCPeerConnection(config);
            pcs[targetUid] = peer;
            localStream.getTracks().forEach(t => peer.addTrack(t, localStream));

            peer.onicecandidate = e => {
                if (e.candidate) db.ref(`calls/${currentCallId}/signals`).push({ type: 'candidate', candidate: e.candidate.toJSON(), from: currentUser.uid, to: targetUid });
            };
            peer.ontrack = e => {
                let audio = document.getElementById(`audio_${targetUid}`);
                if (!audio) {
                    audio = document.createElement('audio');
                    audio.id = `audio_${targetUid}`;
                    audio.autoplay = true;
                    document.body.appendChild(audio);
                }
                audio.srcObject = e.streams[0];
            };
            return peer;
        }

        async function createGroupOffer(targetUid) {
            const peer = createGroupPC(targetUid);
            const offer = await peer.createOffer();
            await peer.setLocalDescription(offer);
            db.ref(`calls/${currentCallId}/signals`).push({ type: 'offer', offer: { sdp: offer.sdp, type: offer.type }, from: currentUser.uid, to: targetUid });
        }

        function listenForGroupSignals() {
            db.ref(`calls/${currentCallId}/signals`).on('child_added', async snap => {
                const signal = snap.val();
                if (signal.to !== currentUser.uid) return;

                if (signal.type === 'offer') {
                    const peer = createGroupPC(signal.from);
                    await peer.setRemoteDescription(new RTCSessionDescription(signal.offer));
                    const answer = await peer.createAnswer();
                    await peer.setLocalDescription(answer);
                    db.ref(`calls/${currentCallId}/signals`).push({ type: 'answer', answer: { sdp: answer.sdp, type: answer.type }, from: currentUser.uid, to: signal.from });
                } else if (signal.type === 'answer') {
                    const peer = pcs[signal.from];
                    if (peer) await peer.setRemoteDescription(new RTCSessionDescription(signal.answer));
                } else if (signal.type === 'candidate') {
                    const peer = pcs[signal.from];
                    if (peer && peer.remoteDescription) {
                        peer.addIceCandidate(new RTCIceCandidate(signal.candidate)).catch(e => console.warn(e));
                    }
                }
            });
        }

        function rejectCall() {
            if (currentCallId) {
                if (incomingCallGroupId) {
                    db.ref(`user_calls/${currentUser.uid}`).remove();
                } else {
                    db.ref(`calls/${currentCallId}`).update({ status: 'rejected' });
                    db.ref(`calls/${currentCallId}`).remove();
                    db.ref(`user_calls/${currentUser.uid}`).remove();
                }
            }
            endCallUI();
        }

        function endCallUI() {
            document.getElementById('callModal').classList.add('hidden');
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (pc) pc.close();
            if (ringtoneAudio) {
                ringtoneAudio.pause();
                ringtoneAudio.currentTime = 0;
            }
            clearTimeout(callTimeoutTimer);

            if (incomingCallGroupId && currentCallId) db.ref(`calls/${currentCallId}/participants/${currentUser.uid}`).remove();

            if (callParticipantsListener && currentCallId) {
                db.ref(`calls/${currentCallId}/participants`).off('value', callParticipantsListener);
                callParticipantsListener = null;
            }

            const groupMembersContainer = document.getElementById('groupCallMembers');
            if (groupMembersContainer) {
                groupMembersContainer.innerHTML = '';
                groupMembersContainer.classList.add('hidden');
                groupMembersContainer.classList.remove('flex');
            }

            pc = null;
            Object.values(pcs).forEach(p => p.close());

            pcs = {};
            document.querySelectorAll('audio[id^="audio_"]').forEach(el => el.remove());

            localStream = null;
            currentCallId = null;
            incomingCallGroupId = null;
            isMuted = false;

            // Reset mute button UI
            const btn = document.getElementById('muteBtn');
            if (btn) {
                btn.classList.remove('bg-red-500/20', 'text-red-400');
                btn.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>`;
            }
        }

        function toggleMute() {
            if (!localStream) return;
            const audioTrack = localStream.getAudioTracks()[0];
            if (!audioTrack) return;

            isMuted = !isMuted;
            audioTrack.enabled = !isMuted;

            if (incomingCallGroupId && currentCallId) {
                db.ref(`calls/${currentCallId}/participants/${currentUser.uid}`).update({ isMuted: isMuted });
            }

            const btn = document.getElementById('muteBtn');
            if (isMuted) {
                btn.classList.add('bg-red-500/20', 'text-red-400');
                // Mic Slash Icon
                btn.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M1 1l22 22M9 9v3a3 3 0 005.121 2.121M15 9.34V5a3 3 0 00-5.943-.584M19 11a7 7 0 01-12.012 4.988M12 18.5V22m-4 0h8" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>`;
                showToast("Microphone muted", "success");
            } else {

        function formatDividerDate(time) {
            const date = new Date(time);
            const today = new Date();
            const yesterday = new Date();
            yesterday.setDate(today.getDate() - 1);

            if (date.toDateString() === today.toDateString()) return "Today";
            if (date.toDateString() === yesterday.toDateString()) return "Yesterday";

            return date.toLocaleDateString(undefined, {
                day: 'numeric',
                month: 'short',
                year: date.getFullYear() !== today.getFullYear() ? 'numeric' : undefined
            });
        }

        function getTicks(msg, forGroup = false, groupTotalCount = 0) {
            const size = "w-4 h-4";
            let status = msg.status || 1;

            if (forGroup && groupTotalCount > 1) {
                const receipts = msg.receipts || {};
                // Everyone except the sender must have a receipt
                const requiredReceipts = groupTotalCount - 1;
                const receiptEntries = Object.entries(receipts).filter(([uid]) => uid !== msg.sender);

                const deliveredCount = receiptEntries.filter(([_, s]) => s >= 2).length;
                const readCount = receiptEntries.filter(([_, s]) => s === 3).length;

                if (readCount >= requiredReceipts) status = 3;
                else if (deliveredCount >= requiredReceipts) status = 2;
                else status = 1;
            }

            if (status === 3) {
                // Double Blue Tick (Seen) - Extra bold and neon
                return `<svg class="${size}" style="filter: drop-shadow(0 0 2px rgba(0, 242, 254, 0.4));" viewBox="0 0 24 24" fill="none" stroke="#00f2fe" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12l5 5L12 12"/><path d="M7 12l5 5L22 7"/></svg>`;
            } else if (status === 2) {
                // Double Gray Tick (Delivered)
                return `<svg class="${size} text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12l5 5L12 12"/><path d="M7 12l5 5L22 7"/></svg>`;
            } else {
                // Single Gray Tick (Sent)
                return `<svg class="${size} text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;
            }
        }

        function handleEmojiInput() {
            const input = document.getElementById('msg');
            const div = document.getElementById('emojiSuggestions');
            const val = input.value;
            const words = val.split(' ');
            const lastWord = words[words.length - 1];

            if (lastWord.startsWith(':') && lastWord.length >= 1) {
                if (lastWord !== lastEmojiQuery) {
                    emojiIdx = 0;
                    lastEmojiQuery = lastWord;
                    div.scrollTop = 0;
                }
                activeMatches = Object.entries(EMOJI_MAP).filter(([k]) => k.includes(lastWord));
                if (activeMatches.length > 0) {
                    if (emojiIdx >= activeMatches.length) emojiIdx = 0;
                    renderEmojiSuggestions();
                    div.classList.remove('hidden');
                } else {
                    div.classList.add('hidden');
                }
            } else {
                div.classList.add('hidden');
                lastEmojiQuery = '';
            }
        }

        function handleMsgKeydown(e) {
            const div = document.getElementById('emojiSuggestions');
            const isVisible = !div.classList.contains('hidden');

            if (isVisible) {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    emojiIdx = (emojiIdx + 1) % activeMatches.length;
                    renderEmojiSuggestions();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    emojiIdx = (emojiIdx - 1 + activeMatches.length) % activeMatches.length;
                    renderEmojiSuggestions();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    applyEmoji(activeMatches[emojiIdx][0]);
                } else if (e.key === 'Escape') {
                    div.classList.add('hidden');
                }
            } else if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        }

        function createGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            const btn = event.target;
            const originalText = 'Create Group';

            if (!name) return showToast("Group name is required.");
            if (name.length > 30) return showToast("Group name is too long.");
            if (/[<>]/.test(name)) return showToast("Scripting characters not allowed!");
            if (groupSelectedMembers.size === 0) return showToast('Please select at least one member.');

            setBtnLoading(btn, true, 'Forging Group...', originalText);

            const groupId = 'group_' + Date.now();
            const members = { [currentUser.uid]: true };
            groupSelectedMembers.forEach(uid => members[uid] = true);

            db.ref('groups/' + groupId).set({
                name,
                members,
                createdBy: currentUser.uid,
                createdAt: Date.now(),
                isGroup: true
            }).then(() => {
                const groupUpdates = {};
                Object.keys(members).forEach(uid => {
                    groupUpdates[`user_groups/${uid}/${groupId}`] = true;
                });
                db.ref().update(groupUpdates);

                const addedNames = [];
                groupSelectedMembers.forEach(uid => {
                    const ud = usersData.find(u => u.uid === uid);
                    if (ud) addedNames.push(ud.name);
                });
                const myName = myData ? myData.name : 'Someone';
                db.ref(`messages/${groupId}`).push({
                    sender: currentUser.uid,
                    text: `${myName} created the group and added ${addedNames.join(', ')}.`,
                    type: 'system',
                    time: Date.now(),
                    status: 1
                });

                closeGroupModal();
                showToast("Group created!", "success");
            }).catch(e => {
                showToast(e.message);
                setBtnLoading(btn, false, '', originalText);
            });
        }

        function leaveGroup() {
            if (!isGroup || !selectedUser) return;
            const res = confirm("Are you sure you want to leave this group? You won't see new messages.");
            if (!res) return;

            const gid = selectedUser;
            const myName = myData ? myData.name : 'A participant';

            // Push system message FIRST while we still have group permissions
            db.ref(`messages/${gid}`).push({
                sender: currentUser.uid,
                text: `${myName} left the group.`,
                type: 'system',
                time: Date.now(),
                status: 1
            }).then(() => {
                db.ref(`groups/${gid}/members/${currentUser.uid}`).remove();
                db.ref(`user_groups/${currentUser.uid}/${gid}`).remove();

                showToast("You have left the group.", "success");
                goBack();
            }).catch(e => {
                showToast("Failed to leave group: " + e.message, "error");
            });
        }

                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                            <input type="file" id="avatarInput" class="hidden" accept="image/*" onchange="handleAvatarChange(this)">
                        </label>
                    </div>

                    <div class="space-y-6 mb-10 translate-y-2">
                        <div class="text-left">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-white/30 ml-2 mb-2 block">Display Alias</label>
                            <input id="editAlias" class="glass-input p-4 w-full rounded-2xl text-center font-semibold" placeholder="Your Name" value="${myData ? escapeHTML(myData.name) : ''}" maxlength="30">
                        </div>
                        <button onclick="renderChangePasswordModal()" class="w-full p-3 bg-white/5 hover:bg-white/10 rounded-xl text-xs font-bold text-white/60 transition-all flex items-center justify-center space-x-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                            <span>Security: Update Password</span>
                        </button>
                    </div>

                    <div class="flex space-x-3">
                        <button onclick="document.getElementById('profileModal').remove()" class="flex-1 p-4 bg-white/5 hover:bg-white/10 rounded-2xl transition-colors font-bold text-sm">Cancel</button>
                        <button onclick="updateProfile()" class="flex-1 p-4 gradient-btn rounded-2xl text-white font-bold text-sm shadow-xl">Save Changes</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modal);
        }

        let tempAvatarData = null;

        function handleAvatarChange(input) {
            const file = input.files[0];
            if (!file) return;

            // Enforce 2MB size limit
            if (file.size > 2 * 1024 * 1024) {
                showToast("Max uploading size is 2mb.", "error");
                input.value = ""; // Clear input for safety
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // High resolution for best quality
                    // We'll cap the dimensions at 800px whilst maintaining aspect ratio
                    let width = img.width;
                    let height = img.height;
                    const maxSize = 800;

                    if (width > height) {
                        if (width > maxSize) {
                            height *= maxSize / width;
                            width = maxSize;
                        }
                    } else {
                        if (height > maxSize) {
                            width *= maxSize / height;
                            height = maxSize;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);

                    // Output at 0.9 quality for best clarity/size trade-off
                    tempAvatarData = canvas.toDataURL('image/jpeg', 0.9);
                    document.getElementById('profilePreview').innerHTML = `<img src="${tempAvatarData}" class="w-full h-full object-cover">`;
                    showToast("Profile image updated with high quality!", "success");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateProfile() {
            const btn = document.querySelector('button[onclick="updateProfile()"]');
            const originalText = 'Save Changes';
            const newName = document.getElementById('editAlias').value.trim();
            if (!newName) return showToast("Name cannot be empty.");

            setBtnLoading(btn, true, 'Optimizing Profile...', originalText);

            const updates = { name: newName };
            if (tempAvatarData) updates.avatar = tempAvatarData;

            db.ref('users/' + currentUser.uid).update(updates).then(() => {
                showToast("Profile updated successfully!", "success");
                document.getElementById('profileModal').remove();
                tempAvatarData = null;
            }).catch(e => {
                showToast("Update failed: " + e.message);
                setBtnLoading(btn, false, '', originalText);
            });
        }

        function renderChangePasswordModal() {
            // Close the profile modal first
            const profileModal = document.getElementById('profileModal');
            if (profileModal) profileModal.classList.add('hidden');

            const modal = `
            <div id="passwordModal" class="fixed inset-0 z-[180] bg-black/60 backdrop-blur-2xl flex items-center justify-center p-4">
                <div class="glass-panel w-full max-w-sm rounded-[3rem] p-10 border border-white/20 animate-fade-in shadow-2xl text-center">
                    <div class="w-16 h-16 bg-white/10 rounded-3xl mx-auto mb-6 flex items-center justify-center">
                        <svg class="w-8 h-8 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold mb-4">Secure Account</h2>
                    <p class="text-xs text-white/40 mb-8 px-4">Update your password to keep your conversations private.</p>

                    <div class="space-y-4 mb-10">
                        <div class="relative">
                            <input id="oldPassword" type="password" class="glass-input p-4 pr-12 w-full rounded-2xl text-center text-sm" placeholder="Current Password">
                            <button onclick="togglePassword('oldPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                            </button>
                        </div>
                        <div class="h-px bg-white/5 mx-6"></div>
                        <div class="relative">
                            <input id="newPassword" type="password" class="glass-input p-4 pr-12 w-full rounded-2xl text-center text-sm" placeholder="New Password">
                            <button onclick="togglePassword('newPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                            </button>
                        </div>
                        <div class="relative">
                            <input id="confirmPassword" type="password" class="glass-input p-4 pr-12 w-full rounded-2xl text-center text-sm" placeholder="Confirm Password">
                            <button onclick="togglePassword('confirmPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex space-x-3">
                        <button onclick="closePasswordModal()" class="flex-1 p-4 bg-white/5 hover:bg-white/10 rounded-2xl transition-colors font-bold text-sm">Cancel</button>
                        <button onclick="handlePasswordUpdate()" class="flex-1 p-4 gradient-btn-secondary rounded-2xl text-white font-bold text-sm shadow-xl">Update</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modal);
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').remove();
            const profileModal = document.getElementById('profileModal');
            if (profileModal) profileModal.classList.remove('hidden');
        }

        function handlePasswordUpdate() {
            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confPass = document.getElementById('confirmPassword').value;
            const btn = document.querySelector('button[onclick="handlePasswordUpdate()"]');
            const originalText = 'Update';

            if (!oldPass) return showToast("Enter your current password.");
            if (newPass.length < 6) return showToast("New password should be at least 6 characters.");
            if (newPass !== confPass) return showToast("New passwords do not match.");

            setBtnLoading(btn, true, 'Verifying Credentials...', originalText);

            const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, oldPass);

            // Re-authenticate first for safety
            auth.currentUser.reauthenticateWithCredential(cred).then(() => {
                auth.currentUser.updatePassword(newPass).then(() => {
                    showToast("Password updated successfully!", "success");
                    document.getElementById('passwordModal').remove();
                    document.getElementById('profileModal').remove();
                }).catch(e => {
                    showToast("Update failed: " + e.message);
                    setBtnLoading(btn, false, '', originalText);
                });
            }).catch(e => {
                setBtnLoading(btn, false, '', originalText);
                if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-login-credentials' || (e.message && e.message.includes('invalid-login-credentials'))) {
                    showToast("Incorrect current password. Please try again.");
                } else {
                    showToast("Verification failed: " + e.message);
                }
            });
        }

        // Init App with Session Check, Verification Gate and Delayed Creation Handler
        auth.onAuthStateChanged(user => {
            if (isProcessingLink) return;

            // Priority 1: Check if this is an incoming registration link
            if (auth.isSignInWithEmailLink(window.location.href)) {
                isProcessingLink = true;
                let email = window.localStorage.getItem('emailForSignIn');
                const name = window.localStorage.getItem('nameForSignIn');
                const password = window.localStorage.getItem('passForSignIn');

                if (!email) email = window.prompt('Please confirm your email to complete registration:');

                if (email) {
                    showToast('Activating account...', 'success');
                    auth.signInWithEmailLink(email, window.location.href)
                        .then((result) => {
                            // CLEANUP: Immediately remove the code from URL so the listener doesn't trigger again
                            window.history.replaceState({}, document.title, window.location.pathname);

                            const user = result.user;

                            // DELAYED CREATION: Now that the user is verified, finalize their profile
                            const setupPromise = db.ref('users/' + user.uid).once('value').then(snap => {
                                if (!snap.exists()) {
                                    return db.ref('users/' + user.uid).set({
                                        email: email,
                                        name: name || email.split('@')[0],
                                        createdAt: Date.now()
                                    });
                                }
                            });

                            // Apply password if it was a new registration
                            const passwordPromise = (password && user) ? user.updatePassword(password) : Promise.resolve();

                            Promise.all([setupPromise, passwordPromise]).then(() => {
                                window.localStorage.removeItem('emailForSignIn');
                                window.localStorage.removeItem('nameForSignIn');
                                window.localStorage.removeItem('passForSignIn');
                                setCookie('chatmix_logged_in', user.uid, 20);
                                currentUser = user;
                                isProcessingLink = false; // Reset after all async work
                                renderChat();
                            }).catch(() => {
                                isProcessingLink = false;
                                renderChat(); // Enter anyway if profile load fails but login worked
                            });
                        })
                        .catch((error) => {
                            isProcessingLink = false;
                            // Silently ignore if it's a re-trigger error
                            if (error.code !== 'auth/invalid-action-code') {
                                showToast('Activation failed: ' + error.message);
                            }
                            renderLogin();
                        });
                    return;
                } else {
                    isProcessingLink = false;
                }
            }

            if (user) {
                currentUser = user;
                setCookie('chatmix_logged_in', user.uid, 20);
                renderChat();
            } else {
                eraseCookie('chatmix_logged_in');
                renderLogin();
            }
        });

        // Status Refresh Timer
        setInterval(renderUserList, 15000); // Refresh list every 15s to update online indicators
    </script>
